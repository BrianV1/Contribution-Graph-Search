name: Generate contribution-graph animation

# Regenerates the animated SVGs daily and publishes them to the `output`
# branch, so your README can point at a stable, always-fresh URL without ever
# cluttering your default branch's history.

on:
  # Every day at 03:17 UTC (offset from the top of the hour to dodge cron spikes).
  schedule:
    - cron: '17 3 * * *'
  # Manual trigger from the Actions tab. Leave inputs blank to use
  # robot.config.json; fill one in to override it for a single run.
  workflow_dispatch:
    inputs:
      behavior:
        description: 'Override behavior: escape | explore | wander | patrol | wall_follow'
        default: ''
      planner:
        description: 'Override planner: astar | dijkstra'
        default: ''
  # Regenerate whenever the generator code or config changes on the default branch.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'robot.config.json'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/generate.yml'

# Only one generation at a time; cancel superseded runs.
concurrency:
  group: generate-animation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Generate SVGs
        env:
          # The built-in token has the read:user scope needed for the
          # contributions GraphQL query. No PAT required for your own graph.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Always visualise the fork/repo owner's graph — this is what makes
          # the template "just work" for anyone who forks it.
          GITHUB_USERNAME: ${{ github.repository_owner }}
          INPUT_BEHAVIOR: ${{ github.event.inputs.behavior }}
          INPUT_PLANNER: ${{ github.event.inputs.planner }}
        run: |
          # robot.config.json is the source of truth; a dispatch input, if
          # provided, overrides it for this run only.
          ARGS=(--user "$GITHUB_USERNAME" --config robot.config.json --out dist)
          [ -n "$INPUT_BEHAVIOR" ] && ARGS+=(--behavior "$INPUT_BEHAVIOR")
          [ -n "$INPUT_PLANNER" ] && ARGS+=(--planner "$INPUT_PLANNER")
          npx tsx src/index.ts "${ARGS[@]}"

      - name: Publish to output branch
        run: |
          # Set identity globally so it also applies to the fresh repo we
          # `git init` inside publish/ (a local config on the workspace repo
          # would not be inherited there).
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build the output branch content in a clean, orphan repo.
          mkdir -p publish
          cp dist/robot-dark.svg publish/
          cp dist/robot-light.svg publish/

          cd publish
          git init -q
          git checkout -q -b output
          git add robot-dark.svg robot-light.svg
          git commit -q -m "chore: regenerate animation ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" output
